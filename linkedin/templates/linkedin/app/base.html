<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}LeadFlow AI{% endblock %}</title>
    <style>
        :root {
            --bg: #f5f6f8;
            --paper: #ffffff;
            --paper-strong: #ffffff;
            --ink: #1f2937;
            --muted: #6b7280;
            --line: rgba(31, 41, 55, 0.1);
            --green: #1f4d3d;
            --green-soft: #e6f0ec;
            --gold: #9a6c22;
            --gold-soft: #f3e7d2;
            --danger: #8f4a3b;
            --shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
            --radius-lg: 18px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --font-display: "Segoe UI", "Trebuchet MS", sans-serif;
            --font-body: "Segoe UI", "Trebuchet MS", sans-serif;
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            color: var(--ink);
            font-family: var(--font-body);
            background: var(--bg);
            min-height: 100vh;
        }

        a { color: inherit; text-decoration: none; }

        .shell {
            position: relative;
            z-index: 1;
            width: min(1240px, calc(100% - 32px));
            margin: 0 auto;
            padding: 24px 0 56px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border: 1px solid var(--line);
            background: var(--paper);
            border-radius: 14px;
            box-shadow: var(--shadow);
            animation: rise 0.55s ease-out;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border-radius: 12px;
            background: var(--green);
            color: #fff;
            font-size: 1rem;
        }

        .brand-copy strong {
            display: block;
            font-family: var(--font-display);
            font-size: 1.25rem;
            letter-spacing: 0.02em;
        }

        .brand-copy span {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav a {
            padding: 10px 16px;
            border-radius: 10px;
            color: var(--muted);
            transition: all 180ms ease;
        }

        .nav a:hover,
        .nav a.is-active {
            background: rgba(36, 73, 60, 0.09);
            color: var(--green);
        }

        .hero {
            display: grid;
            grid-template-columns: 1.45fr 0.9fr;
            gap: 20px;
            margin-top: 24px;
            animation: rise 0.65s ease-out;
        }

        .card {
            background: var(--paper);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            border-radius: var(--radius-lg);
            padding: 24px;
        }

        .hero-card {
            min-height: 220px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 10px;
            background: rgba(36, 73, 60, 0.08);
            color: var(--green);
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1, h2, h3 {
            margin: 0 0 10px;
            font-family: var(--font-display);
            font-weight: 600;
        }

        h1 {
            margin-top: 18px;
            font-size: clamp(2rem, 3vw, 3rem);
            line-height: 1.05;
        }

        .lede {
            max-width: 60ch;
            color: var(--muted);
            font-size: 1.02rem;
            line-height: 1.7;
        }

        .stat-grid,
        .grid-2,
        .grid-3 {
            display: grid;
            gap: 18px;
        }

        .stat-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            margin-top: 24px;
        }

        .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }

        .stat {
            padding: 18px;
            border-radius: var(--radius-md);
            border: 1px solid var(--line);
            background: #fafafa;
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 2rem;
            margin-bottom: 6px;
        }

        .stat-label {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .tone-gold .stat-value { color: var(--gold); }
        .tone-green .stat-value { color: var(--green); }
        .tone-ink .stat-value { color: var(--ink); }

        .section {
            margin-top: 22px;
            animation: rise 0.75s ease-out;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 16px;
            margin-bottom: 14px;
        }

        .section-head p {
            color: var(--muted);
            max-width: 64ch;
            margin: 0;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.84rem;
            color: var(--muted);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 8px 12px;
            background: #fff;
        }

        .list,
        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            padding: 14px 0;
            border-bottom: 1px solid var(--line);
            vertical-align: top;
            text-align: left;
        }

        .table th {
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .muted { color: var(--muted); }
        .strong { font-weight: 600; }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 7px 11px;
            border-radius: 999px;
            font-size: 0.8rem;
            background: var(--green-soft);
            color: var(--green);
        }

        .badge.gold {
            background: var(--gold-soft);
            color: #8a6220;
        }

        .badge.fail {
            background: rgba(143, 74, 59, 0.12);
            color: var(--danger);
        }

        .columns {
            display: grid;
            grid-template-columns: repeat(6, minmax(210px, 1fr));
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 6px;
        }

        .column {
            padding: 18px;
            border-radius: 16px;
            background: #f9fafb;
            border: 1px solid var(--line);
            min-height: 240px;
        }

        .column h3 {
            font-size: 1.15rem;
            margin-bottom: 6px;
        }

        .stack {
            display: grid;
            gap: 12px;
            margin-top: 14px;
        }

        .mini-card {
            border-radius: 18px;
            padding: 14px;
            border: 1px solid var(--line);
            background: #fff;
        }

        .mini-card p {
            margin: 8px 0 0;
            color: var(--muted);
            line-height: 1.55;
            font-size: 0.92rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .field.full { grid-column: 1 / -1; }

        label {
            font-size: 0.9rem;
            color: var(--muted);
        }

        input, textarea, select {
            width: 100%;
            border: 1px solid rgba(30, 38, 35, 0.14);
            border-radius: 16px;
            padding: 14px 16px;
            font: inherit;
            color: var(--ink);
            background: #fff;
            transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: rgba(36, 73, 60, 0.45);
            box-shadow: 0 0 0 4px rgba(36, 73, 60, 0.08);
            transform: translateY(-1px);
        }

        .helptext {
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1.45;
        }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 18px;
            border-radius: 10px;
            border: 1px solid transparent;
            background: var(--green);
            color: #fff;
            cursor: pointer;
            font: inherit;
            transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
            box-shadow: none;
        }

        .button:hover { transform: translateY(-1px); }

        .button.secondary {
            background: transparent;
            color: var(--green);
            border-color: rgba(36, 73, 60, 0.18);
            box-shadow: none;
        }

        .messages {
            display: grid;
            gap: 10px;
            margin: 18px 0 0;
        }

        .flash {
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(36, 73, 60, 0.08);
            color: var(--green);
            border: 1px solid rgba(36, 73, 60, 0.14);
        }

        .flash.error {
            background: rgba(143, 74, 59, 0.08);
            color: var(--danger);
            border-color: rgba(143, 74, 59, 0.18);
        }

        .kicker {
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.74rem;
            font-weight: 700;
        }

        .empty {
            padding: 22px;
            border: 1px dashed rgba(30, 38, 35, 0.16);
            border-radius: 12px;
            color: var(--muted);
            background: #fff;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1080px) {
            .hero,
            .grid-2,
            .grid-3,
            .form-grid {
                grid-template-columns: 1fr;
            }

            .topbar {
                border-radius: 14px;
                align-items: start;
                flex-direction: column;
            }
        }

        @media (max-width: 720px) {
            .shell { width: min(100% - 20px, 1240px); }
            .card { padding: 18px; border-radius: 14px; }
            .stat-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2.4rem; }
        }
    </style>
</head>
<body>
<div class="shell">
    <header class="topbar">
        <div class="brand">
            <div class="brand-mark">LF</div>
            <div class="brand-copy">
                <strong>LeadFlow AI</strong>
                <span>Intelligent digital prospecting for modern growth teams</span>
            </div>
        </div>
        <nav class="nav">
            <a href="{% url 'dashboard' %}" class="{% if nav == 'dashboard' %}is-active{% endif %}">Dashboard</a>
            <a href="{% url 'campaigns_page' %}" class="{% if nav == 'campaigns' %}is-active{% endif %}">Campaigns</a>
            <a href="{% url 'prospects_page' %}" class="{% if nav == 'prospects' %}is-active{% endif %}">Prospects</a>
            <a href="{% url 'pipeline_page' %}" class="{% if nav == 'pipeline' %}is-active{% endif %}">Pipeline</a>
            <a href="{% url 'settings_page' %}" class="{% if nav == 'settings' %}is-active{% endif %}">AI Setup</a>
            <a href="{% url 'admin:index' %}">Admin</a>
        </nav>
    </header>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="flash {% if message.tags == 'error' %}error{% endif %}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>
</body>
</html>
